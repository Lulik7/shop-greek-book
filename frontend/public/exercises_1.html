<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Греческая Тренажёрка — Выпуск №1</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    :root{--navy:#0B1F3A;--gold:#C9A84C;--gold2:#e8c97a;--cream:#F8F5EE;
      --green:#4CAF7D;--purple:#9B7FD4;--cdim:rgba(248,245,238,.07);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--navy);color:var(--cream);font-family:'Lato',sans-serif;min-height:100vh;line-height:1.7;}
    .bg{position:fixed;inset:0;z-index:0;pointer-events:none;
      background:radial-gradient(ellipse 70% 55% at 10% 90%,rgba(27,143,224,.06),transparent 60%),
      radial-gradient(ellipse 55% 45% at 90% 10%,rgba(201,168,76,.05),transparent 55%);}
    .wrap{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:40px 20px 0;}
    .page-header{text-align:center;margin-bottom:36px;padding-bottom:24px;border-bottom:1px solid rgba(201,168,76,.2);}
    .brand{font-family:'Cinzel',serif;font-size:11px;letter-spacing:5px;color:var(--gold);text-transform:uppercase;opacity:.7;margin-bottom:20px;}

    /* ── ANIMATED HANDWRITTEN TITLE ── */
    .h-title{
      font-family:'Great Vibes',cursive;
      font-size:clamp(46px,10vw,100px);
      font-weight:400;
      line-height:1.05;
      margin-bottom:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:0;
    }
    .h-title-line{
      display:block;
      position:relative;
      white-space:nowrap;
      color:var(--cream);
    }
    .pen-dot{
      display:inline-block;
      width:5px;height:5px;
      border-radius:50%;
      position:absolute;
      top:50%;transform:translateY(-50%);
      left:0;
      opacity:0;
      background:var(--cream);
      box-shadow:0 0 10px var(--cream),0 0 20px var(--cream);
    }
    .letter{
      display:inline-block;
      opacity:0;
      animation:letterAppear 0.08s ease forwards;
    }
    @keyframes letterAppear{
      0%{opacity:0;}
      100%{opacity:1;}
    }
    @keyframes penTravel{
      0%{left:0;opacity:0;}
      5%{opacity:1;}
      95%{opacity:1;}
      100%{left:100%;opacity:0;}
    }

    .h-sub{font-family:'Cormorant Garamond',serif;font-size:clamp(14px,2.5vw,20px);font-style:italic;color:var(--gold);margin-bottom:12px;opacity:0;animation:fadeSlide .5s ease 2.2s forwards;}
    .h-author{font-size:13px;color:rgba(248,245,238,.5);opacity:0;animation:fadeSlide .5s ease 2.4s forwards;}
    .h-author a{color:var(--gold);text-decoration:none;}
    @keyframes fadeSlide{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:32px;}
    .tab{padding:9px 20px;border-radius:20px;background:var(--cdim);border:1px solid rgba(248,245,238,.1);
      color:rgba(248,245,238,.6);font-size:15px;cursor:pointer;transition:all .2s;
      text-decoration:none;font-family:'Cinzel',serif;letter-spacing:1px;display:inline-block;}
    .tab:hover{border-color:var(--gold);color:var(--gold);}
    .tab.active{background:rgba(201,168,76,.1);border-color:var(--gold);color:var(--gold);}
    .exblock{margin-bottom:40px;}
    .exhead{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
    .exnum{font-family:'Cinzel',serif;font-size:30px;font-weight:700;color:var(--gold);opacity:.4;min-width:46px;line-height:1;}
    .extitles{flex:0 0 auto;max-width:62%;}
    .extitle{font-family:'Cinzel',serif;font-size:15px;font-weight:600;color:var(--cream);}
    .exsub{font-size:13px;color:rgba(248,245,238,.45);font-style:italic;margin-top:2px;}
    .exline{flex:1;height:1px;background:linear-gradient(90deg,rgba(201,168,76,.2),transparent);}
    .excard{background:rgba(14,36,68,.6);border:1px solid rgba(201,168,76,.1);border-radius:14px;padding:22px;backdrop-filter:blur(4px);}
    .ex-hint{font-size:13px;color:rgba(248,245,238,.5);font-style:italic;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid rgba(248,245,238,.07);}
    .ex-hint b{color:var(--gold);font-style:normal;}
    .rows{display:flex;flex-direction:column;gap:8px;}
    .row{display:grid;grid-template-columns:28px 1fr;gap:10px;align-items:start;}
    .rn{font-family:'Cinzel',serif;font-size:12px;color:rgba(248,245,238,.3);padding-top:2px;text-align:right;}
    .rc{font-size:15px;color:var(--cream);line-height:1.7;}
    .freetext{font-size:15px;color:var(--cream);line-height:2.2;white-space:pre-wrap;}
    .afield{display:block;width:100%;margin-top:4px;background:rgba(248,245,238,.04);
      border:none;border-bottom:1px dashed rgba(201,168,76,.3);color:var(--cream);
      font-family:'Lato',sans-serif;font-size:15px;padding:4px;outline:none;
      resize:none;line-height:1.5;min-height:28px;overflow:hidden;transition:border-color .2s;}
    .afield:focus{border-bottom-color:var(--gold);}
    .ifield{display:inline-block;min-width:90px;background:none;border:none;
      border-bottom:1px dashed rgba(201,168,76,.35);color:var(--gold);
      font-family:'Lato',sans-serif;font-size:15px;padding:1px 4px;outline:none;vertical-align:bottom;}
    .ifield:focus{border-bottom-color:var(--gold2);}
    .btn-ans{background:transparent;border:1px solid rgba(201,168,76,.3);
      color:rgba(248,245,238,.6);border-radius:8px;padding:7px 16px;font-size:13px;
      cursor:pointer;font-family:'Cinzel',serif;letter-spacing:1px;transition:all .2s;margin-top:14px;}
    .btn-ans:hover{border-color:var(--gold);color:var(--gold);}
    .btn-ans.open{background:rgba(201,168,76,.08);border-color:var(--gold);color:var(--gold);}
    .ansbox{display:none;margin-top:12px;background:rgba(76,175,125,.05);
      border:1px solid rgba(76,175,125,.2);border-radius:12px;padding:14px 18px;animation:fadeIn .2s ease;}
    .ansbox.show{display:block;}
    .anstitle{font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;color:var(--green);margin-bottom:10px;text-transform:uppercase;}
    .arow{font-size:14px;color:rgba(248,245,238,.75);margin-bottom:4px;line-height:1.6;}
    .site-footer{background:#060E1C;padding:24px 20px;text-align:center;margin-top:60px;}
    .footer-logo{font-family:'Cinzel',serif;color:rgba(201,168,76,.6);font-size:1.2rem;letter-spacing:.3em;margin-bottom:6px;}
    .footer-copy{font-family:'Lato',sans-serif;color:rgba(255,255,255,.5);font-size:.7rem;letter-spacing:.1em;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
    @media(max-width:768px){
      .wrap{padding:20px 14px 0;}
      .exhead{gap:8px;}
      .extitles{max-width:75%;}
      .exnum{font-size:26px;min-width:36px;}
      .extitle{font-size:14px;}
      .exsub{font-size:12px;}
      .excard{padding:16px 14px;}
      .rows{gap:6px;}
      .row{grid-template-columns:22px 1fr;gap:8px;}
      .rn{font-size:11px;}
      .rc{font-size:14px;}
      .freetext, .rc, [style*="font-size:15px"]{font-size:14px !important;}
      .ifield{min-width:70px;font-size:14px;}
      .afield{font-size:14px;}
      .btn-ans{font-size:12px;padding:6px 13px;}
      .arow{font-size:13px;}
      .tabs{gap:6px;}
      .tab{font-size:13px;padding:7px 14px;}
    }
    @media(max-width:400px){
      .wrap{padding:14px 10px 0;}
      .exnum{font-size:22px;min-width:30px;}
      .extitles{max-width:80%;}
      .extitle{font-size:13px;}
      .excard{padding:12px 10px;}
      .ifield{min-width:55px;font-size:13px;}
      .rc{font-size:13px;}
      .tab{font-size:12px;padding:6px 10px;letter-spacing:0.5px;}
    }
  </style>
</head>
<body>
<div class="bg"></div>
<div class="wrap">
  <header class="page-header">
    <div class="brand">Ελληνική Γλώσσα · Упражнения</div>

    <!-- ANIMATED HANDWRITTEN TITLE -->
    <div class="h-title" id="mainTitle">
        <span class="h-title-line line1" id="line1">
            <span class="pen-dot" id="penDot1"></span>
        </span>
      <span class="h-title-line line2" id="line2">
            <span class="pen-dot" id="penDot2"></span>
        </span>
    </div>
    <div class="h-sub">Журнал упражнений по греческому языку</div>
    <div class="h-author">Преподаватель: <a href="mailto:zoepavlovska@gmail.com">Зоя Павловская</a></div>
  </header>

  <nav class="tabs">
    <span class="tab active">Выпуск №1</span>
    <a class="tab" href="exercises_0.html">Пробный выпуск №0</a>
  </nav>

  <!-- задания остаются без изменений -->
  <div class="exblock">
    <div class="exhead">
      <div class="exnum">1</div>
      <div class="extitles">
        <div class="extitle">Από το ένα στα πολλά</div>
        <div class="exsub">От одного ко многим (поставьте во мн. число)</div>
      </div>
      <div class="exline"></div>
    </div>
    <div class="excard">
      <div style="font-size:15px;color:var(--cream);line-height:1.8;"><p style="margin:0;">Ο μαθητής (ученик) -- <input class="ifield"></p></div>
      <button class="btn-ans" onclick="tog(this)">Ответы ↓</button>
      <div class="ansbox">
        <div class="anstitle">Ответы — задание 1</div>
        <div class="arow">Ο μαθητής -- οι μαθητές</div>
      </div>
    </div>
  </div>

</div>
<footer class="site-footer">
  <div class="footer-logo">ΕΛΛΗΝΙΚΑ</div>
  <div class="footer-copy">© 2026 · Все права защищены · </div>
</footer>
<script>
  /* ── HANDWRITTEN TITLE ANIMATION ── */
  (function(){
    var line1Text = 'Греческая';
    var line2Text = 'Тренажёрка';
    var BASE_DELAY = 0.2;
    var LETTER_GAP = 0.07;

    function buildLine(lineEl, text, startDelay){
      var dot = lineEl.querySelector('.pen-dot');
      text.split('').forEach(function(ch, i){
        var span = document.createElement('span');
        span.className = 'letter';
        span.textContent = ch === ' ' ? '\u00A0' : ch;
        span.style.animationDelay = (startDelay + i * LETTER_GAP) + 's';
        lineEl.appendChild(span);
      });
      dot.style.animation = 'penTravel ' + (text.length * LETTER_GAP + 0.1) + 's linear ' + startDelay + 's forwards';
    }

    var line1Delay = BASE_DELAY;
    var line2Delay = line1Delay + line1Text.length * LETTER_GAP + 0.25;
    buildLine(document.getElementById('line1'), line1Text, line1Delay);
    buildLine(document.getElementById('line2'), line2Text, line2Delay);
  })();

  /* ── ANSWER TOGGLE ── */
  function tog(btn){
    var b=btn.nextElementSibling;
    var o=b.classList.contains('show');
    b.classList.toggle('show',!o);
    btn.classList.toggle('open',!o);
    btn.textContent=o?'Ответы ↓':'Скрыть ↑';
  }
  document.querySelectorAll('.afield').forEach(function(t){
    t.addEventListener('input',function(){
      this.style.height='auto';
      this.style.height=this.scrollHeight+'px';
    });
  });
</script>
</body>
</html>
